<h2>Redefinição de senha</h2>
<p>Recebemos um pedido para redefinir a senha da sua conta no Demandaê.</p>
<p>
  <a href="{{ .SiteURL }}/redefinir-senha?token_hash={{ .TokenHash }}&type=recovery">
    Clique aqui para definir uma nova senha
  </a>
</p>
<p>Se você não fez esse pedido, é só ignorar este email — sua senha continua a mesma.</p>
