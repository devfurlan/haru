packages:
  - "apps/*"
  - "packages/*"
# @sentry/react-native NÃO declara @expo/config-plugins, mas o config plugin dele faz
# require('@expo/config-plugins'). No layout isolado do pnpm esse require (feito a partir
# do store) não acha o pacote, e o EAS/expo config quebra com "Cannot find module". Hoistar
# pro node_modules raiz o põe no caminho do walk-up, resolvendo local e no build do EAS.
publicHoistPattern:
  - '*eslint*'
  - '*prettier*'
  - '@expo/config-plugins'
allowBuilds:
  '@prisma/engines': true
  '@sentry/cli': true
  esbuild: true
  prisma: true
  sharp: true
  unrs-resolver: true
minimumReleaseAgeExclude:
  - '@expo/cli@57.0.3'
  - '@expo/fingerprint@0.20.1'
  - '@expo/inline-modules@0.1.1'
  - '@expo/local-build-cache-provider@57.0.1'
  - '@expo/metro-config@57.0.2'
  - '@expo/metro-runtime@57.0.2'
  - '@expo/prebuild-config@57.0.3'
  - '@expo/router-server@57.0.1'
  - babel-preset-expo@57.0.1
  - expo-asset@57.0.2
  - expo-constants@57.0.2
  - expo-linking@57.0.1
  - expo-modules-autolinking@57.0.3
  - expo-modules-core@57.0.1
  - expo-router@57.0.2
  - expo-splash-screen@57.0.1
  - expo@57.0.1
  - expo-notifications@57.0.2
